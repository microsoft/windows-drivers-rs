name: Build

on:
  push:
    branches-ignore:
      - 'gh-readonly-queue/**'
  pull_request:
  merge_group:
  schedule: # Trigger a job on default branch at 4AM PST everyday
    - cron: 0 11 * * *

concurrency:
  group: ${{ github.workflow }}-${{ github.event.compare || github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  RUSTFLAGS: >-
    -D warnings
    -C target-feature=+crt-static
  # --- TEMPORARY DIAGNOSTICS (do not merge) ---
  # Capture verbose cargo + libcurl HTTP/2 logging to investigate the recurring
  # "curl failed [16] Error in the HTTP2 framing layer" download failures.
  # CARGO_HTTP_DEBUG logs curl's frame-level chatter (the `*` lines), headers,
  # and connection reuse. CARGO_LOG/RUST_LOG raise cargo's internal tracing.
  # CARGO_NET_RETRY=0 fails fast on the first error so the trace is clean and
  # not buried under retry noise.
  CARGO_HTTP_DEBUG: "true"
  CARGO_LOG: cargo::ops::registry=trace
  RUST_LOG: trace
  CARGO_NET_RETRY: "0"
  RUST_BACKTRACE: "full"

jobs:
  build:
    name: Build
    strategy:
      fail-fast: false # Allow all matrix variants to complete even if some fail
      matrix:
        runner:
          - name: windows-2025
            arch: amd64
          - name: windows-11-arm
            arch: arm64

        wdk:
          - version: 10.0.22621 # NI WDK
            source: winget
          - version: 10.0.26100 # GE WDK
            source: nuget

        llvm:
          - 17.0.6

        rust_toolchain:
          - stable
          - beta
          - nightly

        cargo_profile:
          - dev
          - release

        target_triple:
          - name: x86_64-pc-windows-msvc
            arch: amd64
          - name: aarch64-pc-windows-msvc
            arch: arm64
    runs-on: ${{ matrix.runner.name }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Winget
        uses: ./.github/actions/install-winget
        with:
          # windows-11-arm runner image does not include winget-cli (see https://github.com/actions/partner-runner-images/issues/95).
          force-cli-install: ${{ matrix.runner.name == 'windows-11-arm' && 'true' || 'false' }}

      - name: Install LLVM ${{ matrix.llvm }}
        uses: ./.github/actions/install-llvm
        with:
          version: ${{ matrix.llvm }}

      - name: Install WDK (${{ matrix.wdk.version }})
        uses: ./.github/actions/install-wdk
        with:
          version: ${{ matrix.wdk.version }}
          source: ${{ matrix.wdk.source }}
          host: ${{ matrix.wdk.source == 'nuget' && matrix.runner.arch || '' }}
          target: ${{ matrix.wdk.source == 'nuget' && matrix.target_triple.arch || '' }}

      - name: Install Rust Toolchain (${{ matrix.rust_toolchain }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust_toolchain }}
          targets: |
            ${{ matrix.target_triple.name }}

      # --- TEMPORARY DIAGNOSTICS (do not merge) ---
      # Top-level `cargo fetch` so CARGO_HTTP_DEBUG's libcurl frame-level trace is
      # captured directly (nested cargo-make/rust-script invocations swallow it).
      # Tee stderr to a file so the trace survives for artifact upload on failure.
      # --- TEMPORARY DIAGNOSTICS (do not merge) ---
      # A/B leg: HTTP/2 multiplexing OFF (single matrix leg only). If this leg
      # stops failing while the HTTP/2-on legs keep hitting
      # "[16] Error in the HTTP2 framing layer", that proves HTTP/2 is the cause.
      - name: HTTP/2 download probe — multiplexing OFF (diagnostics)
        if: ${{ matrix.runner.name == 'windows-2025' && matrix.rust_toolchain == 'stable' && matrix.cargo_profile == 'dev' && matrix.target_triple.name == 'x86_64-pc-windows-msvc' }}
        shell: cmd
        env:
          CARGO_HTTP_MULTIPLEXING: "false"
        run: |
          echo HTTP/2 probe (multiplexing OFF)
          cargo +${{ matrix.rust_toolchain }} fetch --locked --verbose 2> cargo-http-debug.log
          set FETCH_EXIT=%ERRORLEVEL%
          echo ----- cargo-http-debug.log -----
          type cargo-http-debug.log
          exit /b %FETCH_EXIT%

      # All other legs: HTTP/2 multiplexing ON (cargo default). The variable is
      # deliberately NOT set here so cargo uses its default; setting it to an
      # empty string is invalid and makes cargo error out.
      - name: HTTP/2 download probe — multiplexing ON (diagnostics)
        if: ${{ !(matrix.runner.name == 'windows-2025' && matrix.rust_toolchain == 'stable' && matrix.cargo_profile == 'dev' && matrix.target_triple.name == 'x86_64-pc-windows-msvc') }}
        shell: cmd
        run: |
          echo HTTP/2 probe (multiplexing ON / default)
          cargo +${{ matrix.rust_toolchain }} fetch --locked --verbose 2> cargo-http-debug.log
          set FETCH_EXIT=%ERRORLEVEL%
          echo ----- cargo-http-debug.log -----
          type cargo-http-debug.log
          exit /b %FETCH_EXIT%

      - name: Upload cargo http debug log (diagnostics)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-http-debug-${{ matrix.runner.name }}-${{ matrix.rust_toolchain }}-${{ matrix.cargo_profile }}-${{ matrix.target_triple.arch }}
          path: cargo-http-debug.log
          if-no-files-found: ignore

      - name: Run Cargo Build
        run: cargo +${{ matrix.rust_toolchain }} build --locked --profile ${{ matrix.cargo_profile }} --target ${{ matrix.target_triple.name }} --workspace --all-features

      - name: Install Cargo Make
        uses: ./.github/actions/install-cargo-tool
        with:
          tool: cargo-make

      - name: Run Cargo Make (package-driver-flow) in Workspace
        run: cargo make package-driver-flow +${{ matrix.rust_toolchain }} --locked --profile ${{ matrix.cargo_profile }} --target ${{ matrix.target_triple.name }} --workspace

      - name: Build Examples (via Cargo Make)
        run: cargo make --cwd ./examples build +${{ matrix.rust_toolchain }} --locked --profile ${{ matrix.cargo_profile }} --target ${{ matrix.target_triple.name }}

      - name: Package Examples (via Cargo Make)
        run: cargo make --cwd ./examples package-driver-flow +${{ matrix.rust_toolchain }} --locked --profile ${{ matrix.cargo_profile }} --target ${{ matrix.target_triple.name }}

      - name: Build Tests (via Cargo Make)
        run: cargo make --cwd ./tests build +${{ matrix.rust_toolchain }} --locked --profile ${{ matrix.cargo_profile }} --target ${{ matrix.target_triple.name }}

      - name: Package Tests (via Cargo Make)
        run: cargo make --cwd ./tests package-driver-flow +${{ matrix.rust_toolchain }} --locked --profile ${{ matrix.cargo_profile }} --target ${{ matrix.target_triple.name }}

      # Run cargo-wdk on examples and tests
      - name: Install cargo-wdk
        run: cargo +${{ matrix.rust_toolchain }} install --path=crates/cargo-wdk --profile ${{ matrix.cargo_profile }} --locked --force

      - name: Build & Package Examples (via cargo-wdk)
        run: cargo +${{ matrix.rust_toolchain }} wdk build --locked --profile ${{ matrix.cargo_profile }} --target-arch ${{ matrix.target_triple.arch }} --sample
        working-directory: ./examples

      - name: Run build on tests folder (via cargo-wdk)
        run: cargo +${{ matrix.rust_toolchain }} wdk build --locked --profile ${{ matrix.cargo_profile }} --target-arch ${{ matrix.target_triple.arch }}
        working-directory: ./tests
